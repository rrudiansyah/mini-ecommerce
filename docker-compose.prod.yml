services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build production: tidak ada volume mount
    environment:
      - SERVER_NAME=tokosebelah.web.id  # Ganti dengan domain asli
      - TZ=Asia/Jakarta
    # Tidak ada volume mount kode di production
    volumes:
      - uploads_data:/app/public/uploads
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # Tidak expose port DB ke luar di production
    ports: !reset []

  # Tidak include phpMyAdmin di production
  phpmyadmin:
    profiles:
      - debug  # Hanya jalan kalau --profile debug

volumes:
  uploads_data:
    driver: local
